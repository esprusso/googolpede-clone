<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Googolpede</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    height: 100%;
    overflow: hidden;
    font-family: monospace;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  canvas {
    border: 2px solid #0f0;
    image-rendering: pixelated;
  }
  #dpad {
    display: none;
    position: relative;
    margin-top: 8px;
  }
  #dpad button {
    position: absolute;
    background: rgba(0, 255, 0, 0.12);
    border: 2px solid rgba(0, 255, 0, 0.35);
    color: #0f0;
    font-family: monospace;
    font-size: 24px;
    font-weight: bold;
    border-radius: 8px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  #dpad button:active {
    background: rgba(0, 255, 0, 0.35);
    border-color: rgba(0, 255, 0, 0.7);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="dpad">
  <button id="btn-up">&#9650;</button>
  <button id="btn-down">&#9660;</button>
  <button id="btn-left">&#9664;</button>
  <button id="btn-right">&#9654;</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dpad = document.getElementById('dpad');

// Grid dimensions - adaptive for portrait/landscape
let COLS, ROWS;
const HUD_ROWS = 2;
let CELL, HUD_HEIGHT;
let isMobile = false;
let DPAD_SIZE = 0;

function resize() {
  const pad = 16;
  const availW = window.innerWidth - pad;
  const availH = window.innerHeight - pad;

  // Detect mobile by screen width or touch capability
  isMobile = ('ontouchstart' in window) || window.innerWidth < 700;

  if (isMobile && availH > availW) {
    // Portrait mobile: narrower, taller grid
    COLS = 18;
    ROWS = 28;
    // Reserve space for D-pad
    DPAD_SIZE = Math.min(availW * 0.55, 200);
    const totalRows = ROWS + HUD_ROWS;
    CELL = Math.floor(Math.min(availW / COLS, (availH - DPAD_SIZE - 16) / totalRows));
  } else if (isMobile) {
    // Landscape mobile
    COLS = 28;
    ROWS = 16;
    DPAD_SIZE = Math.min(availH * 0.45, 180);
    const totalRows = ROWS + HUD_ROWS;
    CELL = Math.floor(Math.min((availW - DPAD_SIZE - 16) / COLS, availH / totalRows));
  } else {
    // Desktop
    COLS = 30;
    ROWS = 24;
    DPAD_SIZE = 0;
    const totalRows = ROWS + HUD_ROWS;
    CELL = Math.floor(Math.min(availW / COLS, availH / totalRows));
  }

  CELL = Math.max(CELL, 10);
  HUD_HEIGHT = CELL * HUD_ROWS;
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL + HUD_HEIGHT;

  // Position and size D-pad
  if (isMobile) {
    dpad.style.display = 'block';
    const btnSize = Math.floor(DPAD_SIZE * 0.38);
    const gap = Math.floor(DPAD_SIZE * 0.02);
    dpad.style.width = (btnSize * 3 + gap * 2) + 'px';
    dpad.style.height = (btnSize * 3 + gap * 2) + 'px';

    const btns = {
      up:    document.getElementById('btn-up'),
      down:  document.getElementById('btn-down'),
      left:  document.getElementById('btn-left'),
      right: document.getElementById('btn-right'),
    };
    const s = btnSize + 'px';
    for (const b of Object.values(btns)) {
      b.style.width = s;
      b.style.height = s;
      b.style.fontSize = Math.floor(btnSize * 0.4) + 'px';
      b.style.lineHeight = s;
    }
    btns.up.style.left = (btnSize + gap) + 'px'; btns.up.style.top = '0px';
    btns.down.style.left = (btnSize + gap) + 'px'; btns.down.style.top = (btnSize * 2 + gap * 2) + 'px';
    btns.left.style.left = '0px'; btns.left.style.top = (btnSize + gap) + 'px';
    btns.right.style.left = (btnSize * 2 + gap * 2) + 'px'; btns.right.style.top = (btnSize + gap) + 'px';
  } else {
    dpad.style.display = 'none';
  }
}

resize();
window.addEventListener('resize', () => {
  const oldCols = COLS, oldRows = ROWS;
  resize();
  // Re-init title snake if grid changed
  if (gameState === STATE_TITLE && (COLS !== oldCols || ROWS !== oldRows)) {
    initTitleSnake();
  }
});

// Colors
const COL_BG = '#000';
const COL_SNAKE_HEAD = '#5f5';
const COL_TEXT = '#fff';
const COL_WALL = '#0a0';
const COL_HUD_BG = '#111';
const COL_EQUATION = '#0ff';

// Audio - Web Audio API synthesized sounds
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playTone(freq, duration, type, volume, rampDown) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
  if (rampDown !== false) {
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  }
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxCorrect() {
  ensureAudio();
  // Ascending arpeggio - bright and rewarding
  const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    const t = audioCtx.currentTime + i * 0.07;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.2);
  });
  // Sparkle on top
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  const t = audioCtx.currentTime + 0.25;
  osc.frequency.setValueAtTime(1568, t); // G6
  osc.frequency.exponentialRampToValueAtTime(2093, t + 0.15); // C7
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.3);
}

function sfxWrong() {
  ensureAudio();
  // Harsh descending buzz
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);

  // Dissonant second tone
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(185, audioCtx.currentTime);
  osc2.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.6);
  gain2.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start();
  osc2.stop(audioCtx.currentTime + 0.6);
}

function sfxGameOver() {
  ensureAudio();
  // Dramatic descending notes
  const notes = [440, 370, 311, 233, 175];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    const t = audioCtx.currentTime + i * 0.15;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.4);
  });
}

function sfxStart() {
  ensureAudio();
  // Quick power-up sweep
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);

  // Second chirp
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'square';
  const t2 = audioCtx.currentTime + 0.15;
  osc2.frequency.setValueAtTime(880, t2);
  osc2.frequency.exponentialRampToValueAtTime(1760, t2 + 0.1);
  gain2.gain.setValueAtTime(0.1, t2);
  gain2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.25);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(t2);
  osc2.stop(t2 + 0.25);
}

// High scores - persisted to localStorage
const MAX_HIGH_SCORES = 10;
const HS_KEY = 'googolpede_highscores';

function loadHighScores() {
  try {
    const data = JSON.parse(localStorage.getItem(HS_KEY));
    if (Array.isArray(data)) return data.slice(0, MAX_HIGH_SCORES);
  } catch (e) {}
  return [];
}

function saveHighScores(scores) {
  try {
    localStorage.setItem(HS_KEY, JSON.stringify(scores));
  } catch (e) {}
}

function isHighScore(s) {
  const scores = loadHighScores();
  return scores.length < MAX_HIGH_SCORES || s > scores[scores.length - 1].score;
}

function insertHighScore(name, s) {
  const scores = loadHighScores();
  scores.push({ name: name, score: s });
  scores.sort((a, b) => b.score - a.score);
  const trimmed = scores.slice(0, MAX_HIGH_SCORES);
  saveHighScores(trimmed);
  return trimmed;
}

// Game state
const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_GAMEOVER = 2;
const STATE_ENTER_INITIALS = 3;
let gameState = STATE_TITLE;
let snake, direction, nextDirection, score, speed, gameOver, paused;
let equation, correctAnswer, targets, moveTimer;
let titleSnake = []; // decorative snake on title screen
let titleSnakeTimer = 0;
let titleSnakeDir = { x: 1, y: 0 };

// Initials entry state
let initials = '';
let initialsCursor = 0;
let initialsBlinkTimer = 0;

// Effects
let particles = [];
let floatingTexts = [];
let screenFlash = 0; // 0-1, decays each frame
let snakePulse = 0;  // 0-1, makes the snake glow briefly

// Initialize decorative title snake
function initTitleSnake() {
  titleSnake = [];
  const y = Math.floor(ROWS * 0.7);
  for (let i = 0; i < 12; i++) {
    titleSnake.push({ x: Math.floor(COLS / 2) - i, y: y });
  }
  titleSnakeDir = { x: 1, y: 0 };
  titleSnakeTimer = 0;
}

function init() {
  const startX = Math.floor(COLS / 2);
  const startY = Math.floor(ROWS / 2);
  snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  speed = 150;
  gameOver = false;
  paused = false;
  moveTimer = 0;
  particles = [];
  floatingTexts = [];
  screenFlash = 0;
  snakePulse = 0;
  generateProblem();
}

function spawnCorrectEffects(gridX, gridY, value) {
  const C = CELL;
  const oY = HUD_HEIGHT;
  const cx = gridX * C + C / 2;
  const cy = gridY * C + oY + C / 2;

  // Burst of particles
  const colors = ['#0f0', '#5f5', '#ff0', '#0ff', '#fff', '#5ff', '#af0'];
  for (let i = 0; i < 28; i++) {
    const angle = (Math.PI * 2 * i) / 28 + (Math.random() - 0.5) * 0.5;
    const speed = C * (1.5 + Math.random() * 3);
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.8 + Math.random() * 1.2,
      size: C * (0.08 + Math.random() * 0.15),
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }

  // Sparkle ring - smaller particles in a wider ring
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12;
    const speed = C * (3 + Math.random() * 2);
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.5 + Math.random() * 0.5,
      size: C * (0.04 + Math.random() * 0.06),
      color: '#fff',
    });
  }

  // Floating score text
  floatingTexts.push({
    x: cx,
    y: cy,
    text: '+1',
    life: 1,
    decay: 0.7,
    vy: -C * 2,
    size: C * 0.9,
  });

  // Floating "CORRECT!" text
  floatingTexts.push({
    x: cx,
    y: cy + C * 0.8,
    text: 'CORRECT!',
    life: 1,
    decay: 0.6,
    vy: -C * 1.2,
    size: C * 0.55,
  });

  // Screen flash
  screenFlash = 0.4;
  snakePulse = 1;
}

function updateEffects(dt) {
  const sec = dt / 1000;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * sec;
    p.y += p.vy * sec;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.vy += CELL * 1.5 * sec; // slight gravity
    p.life -= p.decay * sec;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy * sec;
    ft.life -= ft.decay * sec;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Decay screen flash
  if (screenFlash > 0) {
    screenFlash = Math.max(0, screenFlash - sec * 3);
  }

  // Decay snake pulse
  if (snakePulse > 0) {
    snakePulse = Math.max(0, snakePulse - sec * 2.5);
  }
}

function drawEffects() {
  // Screen flash overlay
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(0, 255, 100, ${screenFlash * 0.3})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size * 3;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Floating texts
  for (const ft of floatingTexts) {
    ctx.globalAlpha = ft.life;
    ctx.save();
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold ' + Math.round(ft.size * (2 - ft.life)) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function generateProblem() {
  let a, b, op, answer;

  if (score < 5) {
    a = randInt(1, 10);
    b = randInt(1, 10);
    op = '+';
    answer = a + b;
  } else if (score < 10) {
    if (Math.random() < 0.5) {
      a = randInt(1, 15);
      b = randInt(1, 15);
      op = '+';
      answer = a + b;
    } else {
      a = randInt(5, 20);
      b = randInt(1, a);
      op = '-';
      answer = a - b;
    }
  } else if (score < 20) {
    const r = Math.random();
    if (r < 0.33) {
      a = randInt(5, 25);
      b = randInt(5, 25);
      op = '+';
      answer = a + b;
    } else if (r < 0.66) {
      a = randInt(10, 30);
      b = randInt(1, a);
      op = '-';
      answer = a - b;
    } else {
      a = randInt(2, 9);
      b = randInt(2, 9);
      op = '×';
      answer = a * b;
    }
  } else {
    const r = Math.random();
    if (r < 0.25) {
      a = randInt(10, 50);
      b = randInt(10, 50);
      op = '+';
      answer = a + b;
    } else if (r < 0.5) {
      a = randInt(20, 60);
      b = randInt(1, a);
      op = '-';
      answer = a - b;
    } else {
      a = randInt(3, 12);
      b = randInt(3, 12);
      op = '×';
      answer = a * b;
    }
  }

  equation = `${a} ${op} ${b} = ?`;
  correctAnswer = answer;
  spawnTargets();
}

function spawnTargets() {
  const count = randInt(4, 5);
  targets = [];

  const decoySet = new Set();
  decoySet.add(correctAnswer);

  let range = Math.max(3, Math.floor(Math.abs(correctAnswer) * 0.3) + 1);
  let attempts = 0;
  while (decoySet.size < count) {
    let offset = randInt(1, range);
    let decoy = correctAnswer + (Math.random() < 0.5 ? offset : -offset);
    if (decoy < 0) decoy = correctAnswer + offset;
    if (!decoySet.has(decoy)) {
      decoySet.add(decoy);
    }
    attempts++;
    // Widen range if we're stuck finding unique values
    if (attempts % 10 === 0) range++;
  }

  const values = Array.from(decoySet);
  for (let i = values.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [values[i], values[j]] = [values[j], values[i]];
  }

  const occupied = new Set();
  for (const s of snake) occupied.add(`${s.x},${s.y}`);

  for (const val of values) {
    let pos;
    let attempts = 0;
    do {
      pos = { x: randInt(1, COLS - 2), y: randInt(1, ROWS - 2) };
      attempts++;
    } while ((occupied.has(`${pos.x},${pos.y}`) || targets.some(t => t.x === pos.x && t.y === pos.y)) && attempts < 200);

    targets.push({ x: pos.x, y: pos.y, value: val, isCorrect: val === correctAnswer });
  }
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function triggerGameOver() {
  gameOver = true;
  if (score > 0 && isHighScore(score)) {
    gameState = STATE_ENTER_INITIALS;
    initials = '';
    initialsCursor = 0;
  } else {
    gameState = STATE_GAMEOVER;
  }
}

// Input
document.addEventListener('keydown', (e) => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }

  if (gameState === STATE_TITLE) {
    if (e.key === ' ') {
      sfxStart();
      gameState = STATE_PLAYING;
      init();
    }
    return;
  }

  if (gameState === STATE_ENTER_INITIALS) {
    e.preventDefault();
    const key = e.key;
    if (key === 'Backspace') {
      initials = initials.slice(0, -1);
    } else if (key === 'Enter' && initials.length > 0) {
      insertHighScore(initials, score);
      sfxCorrect();
      gameState = STATE_GAMEOVER;
    } else if (/^[a-zA-Z0-9]$/.test(key) && initials.length < 3) {
      initials += key.toUpperCase();
    }
    return;
  }

  if (gameState === STATE_GAMEOVER) {
    if (e.key === ' ') {
      sfxStart();
      gameState = STATE_PLAYING;
      init();
    }
    return;
  }

  switch (e.key) {
    case 'ArrowUp':
      if (direction.y === 0) nextDirection = { x: 0, y: -1 };
      break;
    case 'ArrowDown':
      if (direction.y === 0) nextDirection = { x: 0, y: 1 };
      break;
    case 'ArrowLeft':
      if (direction.x === 0) nextDirection = { x: -1, y: 0 };
      break;
    case 'ArrowRight':
      if (direction.x === 0) nextDirection = { x: 1, y: 0 };
      break;
  }
});

// D-pad button handlers
function setupDpad() {
  const dirs = {
    'btn-up':    { x: 0, y: -1 },
    'btn-down':  { x: 0, y: 1 },
    'btn-left':  { x: -1, y: 0 },
    'btn-right': { x: 1, y: 0 },
  };
  for (const [id, dir] of Object.entries(dirs)) {
    const btn = document.getElementById(id);
    const handler = (e) => {
      e.preventDefault();
      ensureAudio();
      if (gameState !== STATE_PLAYING) return;
      if (dir.x !== 0 && direction.x === 0) nextDirection = dir;
      if (dir.y !== 0 && direction.y === 0) nextDirection = dir;
    };
    btn.addEventListener('touchstart', handler, { passive: false });
    btn.addEventListener('mousedown', handler);
  }
}
setupDpad();

// Swipe gesture detection
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  ensureAudio();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const elapsed = Date.now() - touchStartTime;

  if (gameState === STATE_TITLE || gameState === STATE_GAMEOVER) {
    // Tap to start/restart
    if (dist < 30 && elapsed < 400) {
      sfxStart();
      gameState = STATE_PLAYING;
      init();
    }
    return;
  }

  if (gameState === STATE_ENTER_INITIALS) {
    // Tap anywhere — show prompt for mobile keyboard
    if (dist < 30 && elapsed < 400) {
      promptMobileInitials();
    }
    return;
  }

  // Swipe to change direction during gameplay
  if (dist > 30 && gameState === STATE_PLAYING) {
    if (Math.abs(dx) > Math.abs(dy)) {
      // Horizontal swipe
      if (dx > 0 && direction.x === 0) nextDirection = { x: 1, y: 0 };
      else if (dx < 0 && direction.x === 0) nextDirection = { x: -1, y: 0 };
    } else {
      // Vertical swipe
      if (dy > 0 && direction.y === 0) nextDirection = { x: 0, y: 1 };
      else if (dy < 0 && direction.y === 0) nextDirection = { x: 0, y: -1 };
    }
  }
}, { passive: false });

// Mobile initials entry via prompt
function promptMobileInitials() {
  const input = prompt('Enter your initials (3 chars):', initials);
  if (input !== null) {
    const cleaned = input.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 3);
    if (cleaned.length > 0) {
      initials = cleaned;
      insertHighScore(initials, score);
      sfxCorrect();
      gameState = STATE_GAMEOVER;
    }
  }
}

function updateTitleSnake(dt) {
  titleSnakeTimer += dt;
  if (titleSnakeTimer < 120) return;
  titleSnakeTimer = 0;

  const head = titleSnake[0];
  // Randomly change direction occasionally, but stay in bounds
  if (Math.random() < 0.15) {
    if (titleSnakeDir.x !== 0) {
      titleSnakeDir = { x: 0, y: Math.random() < 0.5 ? -1 : 1 };
    } else {
      titleSnakeDir = { x: Math.random() < 0.5 ? -1 : 1, y: 0 };
    }
  }

  let nx = head.x + titleSnakeDir.x;
  let ny = head.y + titleSnakeDir.y;

  // Bounce off walls
  if (nx <= 0 || nx >= COLS - 1) {
    titleSnakeDir.x *= -1;
    nx = head.x + titleSnakeDir.x;
  }
  if (ny <= 0 || ny >= ROWS - 1) {
    titleSnakeDir.y *= -1;
    ny = head.y + titleSnakeDir.y;
  }

  titleSnake.unshift({ x: nx, y: ny });
  titleSnake.pop();
}

function update(dt) {
  if (gameState === STATE_TITLE) {
    updateTitleSnake(dt);
    return;
  }
  updateEffects(dt);
  if (gameOver) return;

  moveTimer += dt;
  if (moveTimer < speed) return;
  moveTimer = 0;

  direction = nextDirection;
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    sfxGameOver();
    triggerGameOver();
    return;
  }

  // Self collision
  for (let i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      sfxGameOver();
      triggerGameOver();
      return;
    }
  }

  // Check target collision
  let ate = false;
  for (let i = targets.length - 1; i >= 0; i--) {
    if (targets[i].x === head.x && targets[i].y === head.y) {
      if (targets[i].isCorrect) {
        sfxCorrect();
        spawnCorrectEffects(targets[i].x, targets[i].y, targets[i].value);
        score++;
        speed = Math.max(60, speed - 4);
        ate = true;
      } else {
        sfxWrong();
        snake.unshift(head);
        triggerGameOver();
        return;
      }
      break;
    }
  }

  snake.unshift(head);
  if (!ate) {
    snake.pop();
  } else {
    generateProblem();
  }
}

function drawSnakeBody(snakeArr, dir, oY) {
  const C = CELL;
  const pulseBoost = snakePulse * 80;
  for (let i = snakeArr.length - 1; i >= 1; i--) {
    const s = snakeArr[i];
    const brightness = Math.min(255, Math.floor(80 + 176 * (i / snakeArr.length) + pulseBoost));
    const r = Math.min(255, Math.floor(pulseBoost * 1.5));
    const b = Math.min(255, Math.floor(pulseBoost * 0.5));
    ctx.fillStyle = `rgb(${r}, ${brightness}, ${b})`;
    ctx.fillRect(s.x * C + 1, s.y * C + oY + 1, C - 2, C - 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(s.x * C + Math.floor(C / 2), s.y * C + oY + 1, 1, C - 2);
    ctx.fillRect(s.x * C + 1, s.y * C + oY + Math.floor(C / 2), C - 2, 1);
  }

  // Head
  const h = snakeArr[0];
  if (snakePulse > 0) {
    ctx.save();
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = CELL * snakePulse;
    ctx.fillStyle = `rgb(${Math.floor(100 + 155 * snakePulse)}, 255, ${Math.floor(100 + 100 * snakePulse)})`;
    ctx.fillRect(h.x * C + 1, h.y * C + oY + 1, C - 2, C - 2);
    ctx.restore();
  } else {
    ctx.fillStyle = COL_SNAKE_HEAD;
    ctx.fillRect(h.x * C + 1, h.y * C + oY + 1, C - 2, C - 2);
  }

  // Eyes
  ctx.fillStyle = '#000';
  const eyeSize = Math.max(2, Math.round(C * 0.12));
  const eyeInset = Math.round(C * 0.2);
  let ex1, ey1, ex2, ey2;
  if (dir.x === 1) {
    ex1 = h.x * C + C - eyeInset - eyeSize; ey1 = h.y * C + oY + eyeInset;
    ex2 = h.x * C + C - eyeInset - eyeSize; ey2 = h.y * C + oY + C - eyeInset - eyeSize;
  } else if (dir.x === -1) {
    ex1 = h.x * C + eyeInset; ey1 = h.y * C + oY + eyeInset;
    ex2 = h.x * C + eyeInset; ey2 = h.y * C + oY + C - eyeInset - eyeSize;
  } else if (dir.y === -1) {
    ex1 = h.x * C + eyeInset; ey1 = h.y * C + oY + eyeInset;
    ex2 = h.x * C + C - eyeInset - eyeSize; ey2 = h.y * C + oY + eyeInset;
  } else {
    ex1 = h.x * C + eyeInset; ey1 = h.y * C + oY + C - eyeInset - eyeSize;
    ex2 = h.x * C + C - eyeInset - eyeSize; ey2 = h.y * C + oY + C - eyeInset - eyeSize;
  }
  ctx.fillRect(ex1, ey1, eyeSize, eyeSize);
  ctx.fillRect(ex2, ey2, eyeSize, eyeSize);
}

function drawTitleScreen() {
  const C = CELL;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Background
  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Walls
  for (let x = 0; x < COLS; x++) {
    drawWallCell(x, 0, 0);
    drawWallCell(x, ROWS + HUD_ROWS - 1, 0);
  }
  for (let y = 0; y < ROWS + HUD_ROWS; y++) {
    drawWallCell(0, y, 0);
    drawWallCell(COLS - 1, y, 0);
  }

  // Decorative snake slithering around
  drawSnakeBody(titleSnake, titleSnakeDir, 0);

  // Title - large glowing text
  const titleSize = Math.max(36, Math.round(C * 2.5));
  ctx.save();
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold ' + titleSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GOOGOLPEDE', cx, cy - C * 4);
  ctx.restore();

  // Subtitle
  const subSize = Math.max(14, Math.round(C * 0.7));
  ctx.fillStyle = COL_EQUATION;
  ctx.font = subSize + 'px monospace';
  ctx.fillText('A Math Snake Game', cx, cy - C * 2.2);

  // Divider line
  const divW = C * 12;
  ctx.strokeStyle = '#0a0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - divW / 2, cy - C * 1.2);
  ctx.lineTo(cx + divW / 2, cy - C * 1.2);
  ctx.stroke();

  const instrSize = Math.max(12, Math.round(C * 0.6));
  ctx.font = instrSize + 'px monospace';

  const highScores = loadHighScores();
  if (highScores.length > 0) {
    // Show high scores table
    ctx.fillStyle = COL_EQUATION;
    ctx.font = 'bold ' + Math.max(14, Math.round(C * 0.7)) + 'px monospace';
    ctx.fillText('HIGH SCORES', cx, cy - C * 0.2);

    ctx.font = instrSize + 'px monospace';
    const lineH = C * 0.85;
    highScores.forEach((entry, i) => {
      const y = cy + C * 0.8 + i * lineH;
      const rank = String(i + 1).padStart(2, ' ');
      const name = entry.name.padEnd(3, ' ');
      const sc = String(entry.score).padStart(5, ' ');
      ctx.fillStyle = i === 0 ? '#ff0' : '#888';
      ctx.fillText(`${rank}. ${name}  ${sc}`, cx, y);
    });
  } else {
    // Show instructions for first-time players
    ctx.fillStyle = '#aaa';
    const instructions = [
      'Solve math problems by eating',
      'the correct answer!',
      '',
      isMobile ? 'SWIPE or D-PAD to move' : 'ARROW KEYS to move',
      'Eat the RIGHT answer to grow',
      'Eat a WRONG answer = Game Over',
      'Hit a wall or yourself = Game Over',
    ];
    instructions.forEach((line, i) => {
      if (line === '') return;
      ctx.fillStyle = i < 2 ? '#ccc' : '#888';
      ctx.fillText(line, cx, cy + C * (i * 0.9 - 0.2));
    });
  }

  // Blinking prompt
  const promptSize = Math.max(16, Math.round(C * 0.8));
  ctx.font = 'bold ' + promptSize + 'px monospace';
  const blink = Math.sin(Date.now() / 400) > 0;
  if (blink) {
    ctx.fillStyle = '#ff0';
    ctx.fillText(isMobile ? 'Tap to Start' : 'Press SPACE to Start', cx, cy + C * 6.5);
  }

  // Version / credits
  const credSize = Math.max(10, Math.round(C * 0.45));
  ctx.font = credSize + 'px monospace';
  ctx.fillStyle = '#444';
  ctx.fillText('Inspired by the 1993 DOS classic', cx, canvas.height - C * 0.8);
}

function draw() {
  if (gameState === STATE_TITLE) {
    drawTitleScreen();
    return;
  }

  const C = CELL;

  // Background
  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // HUD background
  ctx.fillStyle = COL_HUD_BG;
  ctx.fillRect(0, 0, canvas.width, HUD_HEIGHT);
  ctx.strokeStyle = COL_WALL;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, HUD_HEIGHT);
  ctx.lineTo(canvas.width, HUD_HEIGHT);
  ctx.stroke();

  // Font sizes scale with cell size
  const fontSm = Math.max(10, Math.round(C * 0.5)) + 'px monospace';
  const fontMd = Math.max(12, Math.round(C * 0.65)) + 'px monospace';
  const fontLg = Math.max(14, Math.round(C * 0.8)) + 'px monospace';
  const fontXl = Math.max(20, Math.round(C * 1.4)) + 'px monospace';
  const fontXxl = Math.max(28, Math.round(C * 1.8)) + 'px monospace';

  // Score
  ctx.fillStyle = COL_TEXT;
  ctx.font = 'bold ' + fontMd;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(`SCORE: ${score}`, C * 0.5, HUD_HEIGHT / 2 - C * 0.3);

  // Equation
  ctx.fillStyle = COL_EQUATION;
  ctx.font = 'bold ' + fontLg;
  ctx.textAlign = 'center';
  ctx.fillText(equation, canvas.width / 2, HUD_HEIGHT / 2);

  // Speed indicator
  ctx.fillStyle = '#888';
  ctx.font = fontSm;
  ctx.textAlign = 'right';
  ctx.fillText(`SPEED: ${Math.round((1 - (speed - 60) / 90) * 100)}%`, canvas.width - C * 0.5, HUD_HEIGHT / 2 - C * 0.3);

  const oY = HUD_HEIGHT;

  // Walls
  for (let x = 0; x < COLS; x++) {
    drawWallCell(x, 0, oY);
    drawWallCell(x, ROWS - 1, oY);
  }
  for (let y = 0; y < ROWS; y++) {
    drawWallCell(0, y, oY);
    drawWallCell(COLS - 1, y, oY);
  }

  // Targets
  for (const t of targets) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 300);
    ctx.fillStyle = `rgba(255,255,100,${pulse * 0.15})`;
    ctx.fillRect(t.x * C - 2, t.y * C + oY - 2, C + 4, C + 4);

    ctx.fillStyle = '#220';
    ctx.fillRect(t.x * C, t.y * C + oY, C, C);

    ctx.fillStyle = COL_TEXT;
    ctx.font = 'bold ' + fontMd;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.value.toString(), t.x * C + C / 2, t.y * C + oY + C / 2);
  }

  // Snake
  drawSnakeBody(snake, direction, oY);

  // Effects (particles, floating text, screen flash)
  drawEffects();

  // Enter initials overlay
  if (gameState === STATE_ENTER_INITIALS) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, oY, canvas.width, canvas.height - oY);

    const cx = canvas.width / 2;
    const midY = canvas.height / 2;

    ctx.fillStyle = '#ff0';
    ctx.font = 'bold ' + fontXxl;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('NEW HIGH SCORE!', cx, midY - C * 4);

    ctx.fillStyle = COL_TEXT;
    ctx.font = fontXl;
    ctx.fillText(`Score: ${score}`, cx, midY - C * 2.5);

    ctx.fillStyle = '#aaa';
    ctx.font = fontMd;
    ctx.fillText('Enter your initials:', cx, midY - C * 1);

    // Draw 3 initial slots
    const slotW = C * 1.8;
    const slotH = C * 2;
    const slotGap = C * 0.5;
    const totalW = slotW * 3 + slotGap * 2;
    const startX = cx - totalW / 2;
    const slotY = midY + C * 0.3;

    for (let i = 0; i < 3; i++) {
      const sx = startX + i * (slotW + slotGap);
      // Slot background
      ctx.fillStyle = i === initials.length ? '#1a1a1a' : '#111';
      ctx.fillRect(sx, slotY, slotW, slotH);
      // Slot border
      ctx.strokeStyle = i === initials.length ? '#0f0' : '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, slotY, slotW, slotH);
      // Letter
      if (i < initials.length) {
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold ' + fontXl;
        ctx.fillText(initials[i], sx + slotW / 2, slotY + slotH / 2);
      } else if (i === initials.length) {
        // Blinking cursor
        const blink = Math.sin(Date.now() / 300) > 0;
        if (blink) {
          ctx.fillStyle = '#0f0';
          ctx.fillRect(sx + slotW * 0.3, slotY + slotH - C * 0.3, slotW * 0.4, 3);
        }
      }
    }

    ctx.fillStyle = '#666';
    ctx.font = fontSm;
    ctx.fillText(isMobile ? 'Tap to enter initials' : 'Press ENTER to confirm', cx, slotY + slotH + C * 1.2);
  }

  // Game Over overlay
  if (gameState === STATE_GAMEOVER) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, oY, canvas.width, canvas.height - oY);

    const cx = canvas.width / 2;
    const midY = oY + (canvas.height - oY) / 2;

    ctx.fillStyle = '#f00';
    ctx.font = 'bold ' + fontXxl;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', cx, midY - C * 5);

    ctx.fillStyle = COL_TEXT;
    ctx.font = fontXl;
    ctx.fillText(`Final Score: ${score}`, cx, midY - C * 3.5);

    // High scores table
    const scores = loadHighScores();
    if (scores.length > 0) {
      ctx.fillStyle = COL_EQUATION;
      ctx.font = 'bold ' + fontMd;
      ctx.fillText('HIGH SCORES', cx, midY - C * 2);

      ctx.font = fontMd;
      const lineH = C * 0.9;
      scores.forEach((entry, i) => {
        const y = midY - C * 0.8 + i * lineH;
        const rank = String(i + 1).padStart(2, ' ');
        const name = entry.name.padEnd(3, ' ');
        const sc = String(entry.score).padStart(5, ' ');
        ctx.fillStyle = (entry.score === score && i === scores.findIndex(e => e.score === score && e.name === entry.name)) ? '#ff0' : '#888';
        ctx.fillText(`${rank}. ${name}  ${sc}`, cx, y);
      });
    }

    ctx.fillStyle = '#888';
    ctx.font = fontMd;
    const blink = Math.sin(Date.now() / 400) > 0;
    if (blink) {
      ctx.fillText(isMobile ? 'Tap to Restart' : 'Press SPACE to Restart', cx, midY + C * 5);
    }
  }
}

function drawWallCell(x, y, oY) {
  ctx.fillStyle = COL_WALL;
  const fontSize = Math.max(10, Math.round(CELL * 0.55));
  ctx.font = fontSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('░', x * CELL + CELL / 2, y * CELL + oY + CELL / 2);
}

// Main loop
let prevTime = 0;
function loop(timestamp) {
  const dt = timestamp - prevTime;
  prevTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

initTitleSnake();
requestAnimationFrame((t) => {
  prevTime = t;
  loop(t);
});
</script>
</body>
</html>
